type: object
required:
  - id
  - userId
  - difficulty
  - turn
  - start
  - country
  - availableMoves
  - usedCountries
  - moves
  - createdAt
  - updatedAt
properties:
  id:
    type: string
  userId:
    type: string
  difficulty:
    type: string
    enum:
      - easy
      - medium
      - hard
  turn:
    type: string
    enum:
      - player
      - ai
  start:
    type: string
  country:
    type: string
  availableMoves:
    type: array
    items:
      type: string
  usedCountries:
    type: array
    items:
      type: string
  moves:
    type: object
    additionalProperties:
      $ref: ./create-ai-game-response-move.yml
  createdAt:
    type: integer
    format: int64
  updatedAt:
    type: integer
    format: int64
