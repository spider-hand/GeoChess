type: array
items:
  type: object
  required: [id, userId, difficulty, result, createdAt, updatedAt]
  properties:
    id:
      type: string
    userId:
      type: string
    difficulty:
      type: string
      enum: [easy, medium, hard]
    result:
      type: string
      enum: [win, lose]
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
