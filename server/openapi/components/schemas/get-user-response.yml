type: object
required:
  - userId
  - displayName
  - createdAt
  - updatedAt
properties:
  userId:
    type: string
  displayName:
    type: string
  country:
    type: string
    minLength: 2
    maxLength: 2
    pattern: '^[A-Z]{2}$'
  createdAt:
    type: string
    format: date-time
  updatedAt:
    type: string
    format: date-time
