openapi: 3.1.0
info:
  title: GeoChess Server API
  version: 1.0.0
  description: API specification for the GeoChess server.
servers:
  - url: /
paths:
  /api/v1/health:
    $ref: ./paths/api/v1/health.yml
  /api/v1/ai-games:
    $ref: ./paths/api/v1/ai-games/index.yml
  /api/v1/ai-games/{gameId}/moves:
    $ref: ./paths/api/v1/ai-games/moves.yml
  /api/v1/with-friends-games:
    $ref: ./paths/api/v1/with-friends-games/index.yml
  /api/v1/with-friends-games/join:
    $ref: ./paths/api/v1/with-friends-games/join.yml
  /api/v1/with-friends-games/{gameId}/moves:
    $ref: ./paths/api/v1/with-friends-games/moves.yml
  /api/v1/users/me:
    $ref: ./paths/api/v1/users/me.yml
  /api/v1/users/{userId}:
    $ref: ./paths/api/v1/users/user-by-id.yml
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    GetHealthResponse:
      $ref: ./components/schemas/get-health-response.yml
    CreateAiGameResponse:
      $ref: ./components/schemas/create-ai-game-response.yml
    CreateAiGameRequest:
      $ref: ./components/schemas/create-ai-game-request.yml
    GetAiGamesResponse:
      $ref: ./components/schemas/get-ai-games-response.yml
    CreateAiGameResponseMove:
      $ref: ./components/schemas/create-ai-game-response-move.yml
    CreateAiGameMoveRequest:
      $ref: ./components/schemas/create-ai-game-move-request.yml
    CreateWithFriendsGameResponse:
      $ref: ./components/schemas/create-with-friends-game-response.yml
    JoinWithFriendsGameRequest:
      $ref: ./components/schemas/join-with-friends-game-request.yml
    JoinWithFriendsGameResponse:
      $ref: ./components/schemas/join-with-friends-game-response.yml
    CreateWithFriendsGameMoveRequest:
      $ref: ./components/schemas/create-with-friends-game-move-request.yml
    GetUserResponse:
      $ref: ./components/schemas/get-user-response.yml
    GetCurrentUserResponse:
      $ref: ./components/schemas/get-current-user-response.yml
    CreateUserRequest:
      $ref: ./components/schemas/create-user-request.yml
    CreateUserResponse:
      $ref: ./components/schemas/create-user-response.yml
    UpdateUserRequest:
      $ref: ./components/schemas/update-user-request.yml
    UpdateUserResponse:
      $ref: ./components/schemas/update-user-response.yml
    ErrorResponse:
      $ref: ./components/schemas/error-response.yml
