parameters:
  - name: gameId
    in: path
    required: true
    schema:
      type: string
post:
  operationId: createAiGameMove
  summary: Create ai game move
  security:
    - BearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../../../components/schemas/create-ai-game-move-request.yml
  responses:
    '202':
      description: Ai game move accepted
    '400':
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: ../../../../components/schemas/error-response.yml
    '401':
      description: Authentication failed
      content:
        application/json:
          schema:
            $ref: ../../../../components/schemas/error-response.yml
    '404':
      description: Ai game not found
      content:
        application/json:
          schema:
            $ref: ../../../../components/schemas/error-response.yml
