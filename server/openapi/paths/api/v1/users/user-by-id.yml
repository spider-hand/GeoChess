parameters:
  - name: userId
    in: path
    required: true
    schema:
      type: string
get:
  operationId: getUser
  summary: Get user
  security:
    - BearerAuth: []
  responses:
    '200':
      description: User found
      content:
        application/json:
          schema:
            $ref: ../../../../components/schemas/get-user-response.yml
    '401':
      description: Authentication failed
      content:
        application/json:
          schema:
            $ref: ../../../../components/schemas/error-response.yml
    '404':
      description: User not found
      content:
        application/json:
          schema:
            $ref: ../../../../components/schemas/error-response.yml
