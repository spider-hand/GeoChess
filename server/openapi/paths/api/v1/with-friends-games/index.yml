get:
  operationId: getWithFriendsGames
  summary: List current user's completed with-friends games
  security:
    - BearerAuth: []
  parameters:
    - name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    - name: sort_by
      in: query
      schema:
        type: string
        enum: [created_at, updated_at]
        default: updated_at
    - name: order_by
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc
  responses:
    '200':
      description: Completed with-friends games
      content:
        application/json:
          schema:
            $ref: ../../../../components/schemas/get-with-friends-games-response.yml
    '400':
      description: Invalid query parameters
      content:
        application/json:
          schema:
            $ref: ../../../../components/schemas/error-response.yml
    '401':
      description: Authentication failed
      content:
        application/json:
          schema:
            $ref: ../../../../components/schemas/error-response.yml
post:
  operationId: createWithFriendsGame
  summary: Create with-friends game
  security:
    - BearerAuth: []
  responses:
    '201':
      description: With-friends game created
      content:
        application/json:
          schema:
            $ref: ../../../../components/schemas/create-with-friends-game-response.yml
    '401':
      description: Authentication failed
      content:
        application/json:
          schema:
            $ref: ../../../../components/schemas/error-response.yml
